<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Native Plant Six-Pack</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
    background: #f5f0e4;
  }
  .scene { width: 100%; max-width: 820px; }
  svg { width: 100%; height: auto; display: block; }
</style>
</head>
<body>
<div class="scene">
<svg viewBox="0 0 820 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="trayFrontG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e1e"/>
      <stop offset="100%" stop-color="#0c0c0c"/>
    </linearGradient>
    <linearGradient id="traySideG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1a1a1a"/>
      <stop offset="100%" stop-color="#0f0f0f"/>
    </linearGradient>
    <filter id="dropShadow" x="-10%" y="-5%" width="130%" height="140%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feOffset in="b" dx="6" dy="10" result="o"/>
      <feComponentTransfer in="o"><feFuncA type="linear" slope="0.18"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="820" height="600" fill="#f5f0e4"/>

  <!--
    TRAY GEOMETRY — clean parallelogram, 3 wide × 2 deep
    
    Top face corners:
      TL (back-left):   150, 290
      TR (back-right):  640, 245
      FR (front-right): 710, 320
      FL (front-left):  220, 365
    
    Tray depth (front face height): 90px
    
    Bottom corners:
      FL-bot: 210, 455
      FR-bot: 700, 410
      TL-bot: 140, 380
  -->

  <g filter="url(#dropShadow)">

    <!-- TOP FACE -->
    <polygon points="150,290 640,245 710,320 220,365" fill="#222"/>

    <!-- FRONT FACE -->
    <polygon points="220,365 710,320 700,410 210,455" fill="url(#trayFrontG)"/>

    <!-- LEFT SIDE FACE -->
    <polygon points="150,290 220,365 210,455 160,380" fill="#161616"/>

    <!-- RIGHT SIDE FACE -->
    <polygon points="640,245 710,320 700,410 630,335" fill="url(#traySideG)"/>

    <!-- Rim highlights -->
    <polygon points="150,290 640,245 640,249 150,294" fill="#333" opacity="0.5"/>
    <polygon points="640,245 710,320 710,323 640,249" fill="#2a2a2a" opacity="0.4"/>
    <polygon points="150,290 220,365 220,368 150,293" fill="#2a2a2a" opacity="0.35"/>

    <!-- ======== CELL GRID on top face ======== -->
    <!-- 
      3 columns, 2 rows
      Column dividers at 1/3 and 2/3 across
      Row divider at 1/2 down
    -->

    <!-- Column divider 1 (1/3) -->
    <line x1="313" y1="275" x2="383" y2="350" stroke="#2c2c2c" stroke-width="3.5"/>
    <!-- Column divider 2 (2/3) -->
    <line x1="477" y1="260" x2="547" y2="335" stroke="#2c2c2c" stroke-width="3.5"/>
    <!-- Row divider (horizontal mid) -->
    <line x1="185" y1="328" x2="675" y2="283" stroke="#2c2c2c" stroke-width="3.5"/>

    <!-- Front face dividers (columns continuing down) -->
    <line x1="383" y1="350" x2="373" y2="440" stroke="#1a1a1a" stroke-width="3"/>
    <line x1="547" y1="335" x2="537" y2="425" stroke="#1a1a1a" stroke-width="3"/>
    <!-- Front face row divider -->
    <line x1="215" y1="410" x2="705" y2="365" stroke="#1a1a1a" stroke-width="2.5"/>

    <!-- SOIL in each cell -->
    <!-- Back row -->
    <ellipse cx="232" cy="302" rx="58" ry="10" fill="#3a2818" transform="rotate(-3,232,302)"/>
    <ellipse cx="395" cy="288" rx="58" ry="10" fill="#3a2818" transform="rotate(-3,395,288)"/>
    <ellipse cx="558" cy="274" rx="58" ry="10" fill="#3a2818" transform="rotate(-3,558,274)"/>
    <!-- Front row -->
    <ellipse cx="302" cy="350" rx="58" ry="10" fill="#3a2818" transform="rotate(-3,302,350)"/>
    <ellipse cx="465" cy="336" rx="58" ry="10" fill="#3a2818" transform="rotate(-3,465,336)"/>
    <ellipse cx="628" cy="322" rx="58" ry="10" fill="#3a2818" transform="rotate(-3,628,322)"/>

  </g>

  <!-- ===================================================================== -->
  <!-- PLANTS                                                                 -->
  <!-- ===================================================================== -->
