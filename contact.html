<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us — Our Park, Our Vote</title>

<meta name="description" content="Get in touch with Our Park, Our Vote. Questions about the petition, volunteering, or the Lester Park land sale? We'd love to hear from you.">
<meta name="robots" content="index, follow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600;700;800&family=Righteous&display=swap" rel="stylesheet">

<style>
:root {
  --night-sky-deep: #060f1e;
  --night-sky-mid: #0e1f3a;
  --gold: #c8922a;
  --gold-light: #e8b84a;
  --gold-pale: #f5d878;
  --cream: #faf4e8;
  --cream-alt: #f0ebe0;
  --text-dark: #1a1a2e;
  --text-mid: #2d3a50;
  --forest-dark: #0f2a0f;
  --forest-mid: #1e4a1e;
  --forest-light: #2d6e2d;
  --lake-blue: #3a6b8a;
  --alert-red: #c44b3f;
}

* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Libre Baskerville', Georgia, serif;
  color: var(--text-dark);
  background: var(--cream);
  overflow-x: hidden;
  line-height: 1.75;
}

/* ── NAVIGATION ── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(6,15,30,0.92);
  backdrop-filter: blur(8px);
  border-bottom: 2px solid var(--gold);
  padding: 0 2rem;
  display: flex; align-items: center; justify-content: space-between;
  height: 60px;
}
.nav-brand {
  font-family: 'Righteous', 'Arial Black', sans-serif;
  font-size: 1.1rem; color: var(--gold-light);
  text-decoration: none; letter-spacing: 0.05em; text-transform: uppercase;
}
.nav-links {
  display: flex; gap: 0.3rem; list-style: none; align-items: center;
}
.nav-links a {
  color: rgba(255,255,255,0.85); text-decoration: none;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.72rem; font-weight: 700;
  letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.4rem 0.7rem; border-radius: 2px;
  transition: color 0.2s, background 0.2s;
}
.nav-links a:hover { color: var(--gold-light); background: rgba(255,255,255,0.06); }
.nav-links a.cta-nav {
  background: var(--gold); color: #fff;
  margin-left: 0.5rem; padding: 0.45rem 1rem; font-weight: 800;
}
.nav-links a.cta-nav:hover { background: var(--gold-light); }
.hamburger { display: none; background: none; border: none; cursor: pointer; padding: 0.5rem; }
.hamburger span { display: block; width: 24px; height: 2px; background: white; margin: 5px 0; transition: 0.3s; }

/* ── MAIN ── */
.container { max-width: 600px; margin: 0 auto; padding: 0 1.5rem; }

.page-header {
  margin-top: 60px; background: var(--forest-dark);
  padding: 5rem 2rem 3rem; text-align: center;
}
.page-header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2rem, 5vw, 3rem);
  font-weight: 900; color: #fff;
}
.page-header p {
  font-family: 'Source Sans 3', sans-serif;
  color: var(--gold-light); margin-top: 0.75rem;
  font-size: 1.1rem;
}

.contact-section {
  padding: 3rem 1.5rem;
}

.form-field { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 0.75rem; }
.form-field label {
  font-family: 'Source Sans 3', sans-serif; font-size: 0.75rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-mid);
}
.form-field input,
.form-field textarea {
  padding: 0.6rem 0.75rem; border: 1.5px solid #ccc4b0; border-radius: 2px;
  font-family: 'Source Sans 3', sans-serif; font-size: 0.95rem;
  background: #fff;
}
.form-field input:focus,
.form-field textarea:focus { border-color: var(--gold); outline: none; }
.form-field textarea { resize: vertical; min-height: 120px; }

.btn-primary {
  background: var(--gold); color: #fff;
  padding: 0.9rem 2.2rem; border: none; border-radius: 2px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem; font-weight: 800;
  letter-spacing: 0.15em; text-transform: uppercase;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
}
.btn-primary:hover { background: var(--gold-light); transform: translateY(-2px); }

/* ── FOOTER ── */
.footer-gold { height: 4px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin-bottom: 2rem; }
footer {
  background: var(--night-sky-deep); color: rgba(255,255,255,0.6);
  text-align: center; padding: 3rem 1.5rem 2rem;
  font-family: 'Source Sans 3', sans-serif;
}
footer .footer-brand {
  font-family: 'Righteous', sans-serif; font-size: 1.2rem;
  color: var(--gold-light); margin-bottom: 0.5rem;
}
footer p { font-size: 0.82rem; line-height: 1.8; margin-bottom: 0.3rem; }
footer a { color: var(--gold-light); }

/* ── RESPONSIVE ── */
@media (max-width: 768px) {
  .nav-links { display: none; position: absolute; top: 60px; left: 0; right: 0; background: rgba(6,15,30,0.97); flex-direction: column; padding: 1rem; gap: 0.5rem; }
  .nav-links.open { display: flex; }
  .hamburger { display: block; }
}
</style>
</head>

<body>

<!-- ══════════ NAVIGATION ══════════ -->
<nav>
  <a class="nav-brand" href="/"><span style="color:#fff">Our</span> Park. <span style="color:#fff">Our</span> Vote.</a>
  <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menu">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav-links">
    <li><a href="petition1.pdf" target="_blank" onclick="document.querySelector('.nav-links').classList.remove('open')">Download Petitions and Instructions</a></li>
    <li><a href="volunteer.html" onclick="document.querySelector('.nav-links').classList.remove('open')">Volunteer</a></li>
    <li><a href="/" onclick="document.querySelector('.nav-links').classList.remove('open')">Home</a></li>
  </ul>
</nav>

<!-- ══════════ HEADER ══════════ -->
<div class="page-header">
  <h1>Contact Us</h1>
  <p>Questions about the petition or volunteering? We'd love to hear from you.</p>
</div>

<!-- ══════════ CONTACT FORM ══════════ -->
<section class="contact-section">
  <div class="container">
    <form name="contact" method="POST" data-netlify="true" action="/thank-you">
      <input type="hidden" name="form-name" value="contact">
      <div class="form-field">
        <label>Name *</label>
        <input type="text" name="name" placeholder="Jane Smith" required>
      </div>
      <div class="form-field">
        <label>Email *</label>
        <input type="email" name="email" placeholder="jane@example.com" required>
      </div>
      <div class="form-field">
        <label>Message *</label>
        <textarea name="message" placeholder="How can we help?" required></textarea>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;margin-top:0.5rem;">Send Message</button>
    </form>
  </div>
</section>

<div class="footer-gold"></div>
<footer>
  <div class="footer-brand"><span style="color:#fff">Our</span> Park. <span style="color:#fff">Our</span> Vote.</div>
  <p>A not-for-profit, community-driven initiative.</p>
  <p><a href="/">ourparkourvote.org</a></p>
</footer>

</body>
</html>
