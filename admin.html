<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Our Park, Our Vote</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+3:wght@400;600;700&family=Righteous&display=swap" rel="stylesheet">
<style>
:root {
  --night-sky-deep: #060f1e;
  --gold: #c8922a;
  --gold-light: #e8b84a;
  --cream: #faf4e8;
  --text-dark: #1a1a2e;
  --forest-dark: #0f2a0f;
  --alert-red: #c44b3f;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Libre Baskerville', Georgia, serif;
  color: var(--text-dark);
  background: var(--night-sky-deep);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: var(--cream);
  border-radius: 8px;
  padding: 2.5rem 2rem;
  width: 100%;
  max-width: 400px;
  margin: 1rem;
  box-shadow: 0 8px 32px rgba(0,0,0,0.3);
}
.login-card h1 {
  font-family: 'Righteous', sans-serif;
  color: var(--forest-dark);
  font-size: 1.3rem;
  text-align: center;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 0.25rem;
}
.login-card .subtitle {
  text-align: center;
  font-size: 0.85rem;
  color: var(--gold);
  margin-bottom: 1.5rem;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
label {
  display: block;
  font-family: 'Source Sans 3', sans-serif;
  font-weight: 600;
  font-size: 0.85rem;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--text-dark);
  margin-bottom: 0.35rem;
}
input[type="email"],
input[type="password"] {
  width: 100%;
  padding: 0.65rem 0.75rem;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 1rem;
  border: 2px solid #ddd;
  border-radius: 4px;
  margin-bottom: 1rem;
  transition: border-color 0.2s;
}
input:focus {
  outline: none;
  border-color: var(--gold);
}
button {
  width: 100%;
  padding: 0.75rem;
  background: var(--forest-dark);
  color: var(--gold-light);
  border: none;
  border-radius: 4px;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.9rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  cursor: pointer;
  transition: background 0.2s;
}
button:hover { background: #1a4a1a; }
button:disabled { opacity: 0.6; cursor: not-allowed; }
.error {
  background: #fdecea;
  color: var(--alert-red);
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.85rem;
  padding: 0.5rem 0.75rem;
  border-radius: 4px;
  margin-bottom: 1rem;
  display: none;
}
.back-link {
  display: block;
  text-align: center;
  margin-top: 1.25rem;
  font-family: 'Source Sans 3', sans-serif;
  font-size: 0.8rem;
  color: var(--gold);
  text-decoration: none;
}
.back-link:hover { text-decoration: underline; }
</style>
</head>
<body>
  <div class="login-card">
    <h1>Our Park Our Vote</h1>
    <div class="subtitle">Admin Panel</div>
    <div class="error" id="error"></div>
    <form id="loginForm">
      <label for="email">Email</label>
      <input type="email" id="email" name="email" required autocomplete="email">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" required autocomplete="current-password">
      <button type="submit" id="submitBtn">Sign In</button>
    </form>
    <a href="/" class="back-link">Back to site</a>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      const btn = document.getElementById('submitBtn');
      errorEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in...';

      try {
        const res = await fetch('/.netlify/functions/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            password: document.getElementById('password').value,
          }),
        });

        if (res.ok) {
          window.location.href = '/admin-dashboard.html';
        } else {
          const data = await res.json();
          errorEl.textContent = data.error || 'Login failed';
          errorEl.style.display = 'block';
        }
      } catch {
        errorEl.textContent = 'Network error. Please try again.';
        errorEl.style.display = 'block';
      }

      btn.disabled = false;
      btn.textContent = 'Sign In';
    });
  </script>
</body>
</html>
